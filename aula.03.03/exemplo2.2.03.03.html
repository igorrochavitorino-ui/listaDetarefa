<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominando Seletores CSS</title>
    <!-- CSS interno -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI';
        }

        h1 {
            color: rgb(26, 131, 96);
            text-align: center;
        }

        .card-destaque {
            background-color: white;
            color:#e67e22; 
            margin:20px;
            padding: 10px;
        
    
        }
        .card-destaque h2{
            color: rgb(91, 42, 196);
        }
        #aviso-urgente{
            background-color: yellow;
            color: #e67e22;
        }
    </style>
</head>
<body>
    <h1>Dominando Seletores CSS</h1>

    <div class="card-destaque">
        <h2>Seletor de Classe</h2>
        <p>Eu sou um seletor de classe. posso ser repetido várias vezes</p>
    </div>

    <p id="aviso-urgente">AVISO: o ID é único, use apenas uma vez na página</p>

    <hr>
</body>
</html>
