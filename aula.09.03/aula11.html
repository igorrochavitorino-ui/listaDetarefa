<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="stylesheet" href="aula 11.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Flexbox</title>
</head>
<style>



</style>
<!-- Pai -->

<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="./videosmeu-video.mp4/grok-video-657573bf-3635-4824-8a8d-79965fedcbcf.mp4" type="video/mp4">

    </video>

    <!-- Filhos -->
    <div class="img1">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRoCfR6J9GaKZlWLC-1LpJGOdInbnhS1AxWKA&s" width:>
    </div>
    <div class="img2">
        <img src="https://www.portaldotransito.com.br/wp-content/uploads/2022/11/tunning.jpg.webp" width:>
    </div>
    <div class="img3">
        <video src="./videosmeu-video.mp4/grok-video-186798de-ffdc-46af-80e9-2dc2eb51a962 (1).mp4"></video>
    </div>
    <div id="modal-video">
        <video controls id="video-grande">
            <source src="./videosmeu-video.mp4/grok-video-186798de-ffdc-46af-80e9-2dc2eb51a962 (1).mp4"
                type="video/mp4">
        </video>
    </div>
    <script>
        const video = document.querySelector(".img3 video");

        video.addEventListener("click", () => {
            video.classList.toggle("video-aberto");
        });
    </script>
    <script>

        const videoPequeno = document.querySelector(".img3 video");
        const modal = document.getElementById("modal-video");

        videoPequeno.addEventListener("click", () => {
            modal.style.display = "flex";
        });

        modal.addEventListener("click", () => {
            modal.style.display = "none";
        });

    </script>
</body>

</html>
