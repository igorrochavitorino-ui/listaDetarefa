<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>soma</title>
</head>
<body style="background-color:rgb(145, 150, 149); color: rgb(54, 111);">
    <h1> soma números</h1>
    <label for="n1"> 1º numero:</label>
    <input type="number" id="n1"><br><br>
    <label for="n1"> 2º numero:</label>
    <input type="number" id="n2"><br><br>
    <button onclick="somar()"> Somar</button>
    
    <p id="resultado">O resultado é:</p>

    <script>
        function somar(){
            const num1 = Number (document.getElementById('n1').value)
            const num2 = Number (document.getElementById('n2').value)
            const exebirResultado = document.getElementById('resultado')

            const  soma = num1 + num2
            exebirResultado.innerText = `o resultado da soma é: ${soma}`
            exebirResultado.style.color="red"
            exebirResultado.style.background = "green"
            
            
           
          
        }
    </script>


</body>
</html>
