<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{
            background-color: #f4f4f4;
            padding: 20px;
            margin-top: 200px;
            background-image: url('fundo2.jpg');
            background-size: 100%;
            
            
            background-repeat: space;
        }
        .login{
            background-color: rgba(16, 231, 23, 0.292);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            color: #ffffff;
            width: 50%;
            margin: auto;
            text-align: center;
        }
        .campo{
            text-align: center;
            font-family: 'Courier, monospace';
            font-weight: bolder;
            
            
        }
        #botao{
            display: inline-block;
            padding: 5px 10px;
            background-color: rgba(20, 20, 20, 0.631);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 13px;
            margin-top: 10px;
        }
        #senha, #email{
            width: 50%;
        }
        input{
            background-color: rgba(16, 231, 23, 0.631);
        }
        
        p{
            font-family:  Impact;
            font-size: 100%;
        }
    </style>
</head>
<body>
    <div class="login">
        <p>Area restrita</p>
        <div class="campo">
            <label for="email">Usuario: </label><br>
        <input type="email" name="email" id="email">
        </div>
        <div class="campo">
            <label for="senha">Senha: </label><br>
        <input type="password" name="senha"id="senha">
        </div>
        <a href="#" id="botao">Acessar</a>
    </div>
    
</body>
</html>
