<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 100vh;
            background-color: rgb(219, 219, 219);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: rgb(250, 250, 250);
            width: 600px;
            height: 600px;
        }

        .quadrado {            
            width: 100px;
            height: 100px;
        }

        #item-1{
            flex-grow: 0;
            background-color: green;
        }
        #item-2{
            flex-grow: 0;
            background-color: red;
        }
        #item-3{
            flex-grow: 0 ;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="item-1" class="quadrado"></div>
        <div id="item-2" class="quadrado"></div>
        <div id="item-3" class="quadrado"></div>
    </div>    
</body>
</html>
